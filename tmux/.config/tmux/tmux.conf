set -g  default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

set -g mouse on

set -g status-position top
set -g status-style fg="#c5c9c5",bg="#0d0c0c"

set -g status-left " ❐ [#S] | "
set -g status-right "#[fg=#8a9a7b,bg=#0d0c0c] #(top -l 1 | grep -E "^CPU" | sed 's/.*://') #[default]"

set -g window-status-current-format "#[bg=#8a9a7b,fg=#0d0c0c] #I #W #[bg=default,fg=default]"
set -g window-status-format " #I #W "

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind r source-file ~/.config/tmux/tmux.conf
bind - split-window -v
bind | split-window -h
